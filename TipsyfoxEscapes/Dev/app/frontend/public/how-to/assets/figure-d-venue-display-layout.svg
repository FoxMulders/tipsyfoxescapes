<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Figure D: Venue display layout</title>
  <desc id="desc">A venue floor diagram showing a GM tablet connected to the GM console and a player display connected to the player display URL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071116"/>
      <stop offset="1" stop-color="#152a30"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)" font-family="Inter,Segoe UI,Arial">
    <rect x="98" y="76" width="764" height="388" rx="26" fill="#0b161d" stroke="#57d3df" stroke-opacity=".3"/>
    <text x="136" y="130" fill="#ecf8f7" font-size="28" font-weight="800">Two-display venue layout</text>
    <rect x="154" y="176" width="260" height="198" rx="18" fill="#10232b" stroke="#7895a3" stroke-opacity=".45"/>
    <text x="230" y="264" fill="#a8bec2" font-size="18" text-anchor="middle">Play area</text>
    <circle cx="220" cy="308" r="16" fill="#57d3df"/>
    <circle cx="280" cy="308" r="16" fill="#57d3df"/>
    <circle cx="340" cy="308" r="16" fill="#57d3df"/>
    <rect x="506" y="176" width="230" height="118" rx="14" fill="#071116" stroke="#8ff4dc" stroke-opacity=".5"/>
    <text x="564" y="226" fill="#ecf8f7" font-size="21" font-weight="800">Display 2</text>
    <text x="548" y="256" fill="#a8bec2" font-size="15">/room/{sessionId}/player-display</text>
    <rect x="582" y="342" width="190" height="68" rx="14" fill="#071116" stroke="#57d3df" stroke-opacity=".5"/>
    <text x="610" y="372" fill="#ecf8f7" font-size="19" font-weight="800">Display 1</text>
    <text x="620" y="396" fill="#a8bec2" font-size="15">/gm/{sessionId}</text>
    <path d="M506 236 H414" stroke="#8ff4dc" stroke-width="4" stroke-linecap="round"/>
    <path d="M582 376 C500 416 390 390 342 350" fill="none" stroke="#57d3df" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
    <text x="196" y="418" fill="#c9dcdf" font-size="16">Teams face player display</text>
    <text x="594" y="444" fill="#c9dcdf" font-size="16">GM works from side station</text>
  </g>
</svg>
