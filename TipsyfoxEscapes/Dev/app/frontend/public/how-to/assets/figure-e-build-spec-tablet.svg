<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Figure E: Build-ready puzzle specification</title>
  <desc id="desc">A tablet showing narrative justification beside a physical prop graphic for build crews.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061014"/>
      <stop offset="1" stop-color="#182832"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)" font-family="Inter,Segoe UI,Arial">
    <rect x="116" y="88" width="520" height="350" rx="28" fill="#111820" stroke="#8aa7b2" stroke-opacity=".55"/>
    <rect x="146" y="120" width="460" height="286" rx="18" fill="#071116"/>
    <text x="176" y="164" fill="#ecf8f7" font-size="24" font-weight="800">Puzzle Spec: Sofa Cipher</text>
    <text x="176" y="204" fill="#8ff4dc" font-size="17" font-weight="800">Narrative justification</text>
    <text x="176" y="236" fill="#c9dcdf" font-size="16">The hidden tag belongs beneath the sofa</text>
    <text x="176" y="260" fill="#c9dcdf" font-size="16">because the room fiction frames it as the</text>
    <text x="176" y="284" fill="#c9dcdf" font-size="16">smuggler's waiting area. Build crew must</text>
    <text x="176" y="308" fill="#c9dcdf" font-size="16">secure the clue where players can search</text>
    <text x="176" y="332" fill="#c9dcdf" font-size="16">without moving heavy furniture.</text>
    <rect x="176" y="356" width="180" height="30" rx="15" fill="#123c44"/>
    <text x="196" y="377" fill="#ecf8f7" font-size="14" font-weight="700">BOM: tag, tape, UV marker</text>
    <g transform="translate(690 158)">
      <rect x="0" y="92" width="178" height="58" rx="18" fill="#57d3df"/>
      <rect x="24" y="44" width="130" height="70" rx="18" fill="#216977"/>
      <rect x="26" y="150" width="22" height="46" rx="8" fill="#14343c"/>
      <rect x="130" y="150" width="22" height="46" rx="8" fill="#14343c"/>
      <rect x="72" y="120" width="38" height="20" rx="8" fill="#8ff4dc"/>
      <text x="88" y="228" fill="#c9dcdf" font-size="17" text-anchor="middle">Physical prop</text>
    </g>
    <path d="M622 292 C658 272 668 252 696 242" fill="none" stroke="#8ff4dc" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10"/>
  </g>
</svg>
