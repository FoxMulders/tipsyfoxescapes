<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder: Venue ops physical layout</title>
  <desc id="desc">Infographic placeholder for projector, tablet, and GM console placement in the game space.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <rect x="24" y="24" width="912" height="492" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Venue layout (infographic placeholder)</text>
  <rect x="80" y="120" width="320" height="200" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">Display 1  GM tablet</text>
  <text x="240" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">/gm/{sessionId}</text>
  <text x="240" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Timer, clues, puzzle log</text>
  <rect x="560" y="100" width="300" height="140" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="710" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#15803d">Display 2  Projector / TV</text>
  <text x="710" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">/room/{sessionId}/player-display</text>
  <rect x="200" y="360" width="560" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="480" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#92400e">Play area  teams face projector</text>
  <text x="480" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78716c">GM station off to the side; keep cable runs taped and labeled</text>
  <circle cx="240" cy="280" r="24" fill="#dbeafe" stroke="#2563eb"/>
  <text x="240" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e40af">GM</text>
  <polygon points="710,260 690,300 730,300" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="710" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">screen</text>
</svg>
