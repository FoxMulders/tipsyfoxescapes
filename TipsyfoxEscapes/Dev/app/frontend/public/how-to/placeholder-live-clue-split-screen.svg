<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder: GM clue box and player display split screen</title>
  <desc id="desc">Diagram for split-screen clue delivery: GM console sends hint; player window shows it in real time.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="32" y="64" width="420" height="412" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="242" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#94a3b8">GM LIVE CONSOLE</text>
  <rect x="64" y="140" width="356" height="48" rx="6" fill="#0f172a" stroke="#64748b"/>
  <text x="80" y="172" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e1">Type a custom clue&</text>
  <rect x="64" y="210" width="100" height="32" rx="6" fill="#2563eb"/>
  <text x="114" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#fff">Send</text>
  <path d="M452 270 L508 270" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#38bdf8"/></marker></defs>
  <text x="480" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7dd3fc">real-time sync</text>
  <rect x="508" y="64" width="420" height="412" rx="10" fill="#0c1222" stroke="#334155" stroke-width="2"/>
  <text x="718" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#94a3b8">PLAYER WINDOW</text>
  <text x="718" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#f8fafc">42:18</text>
  <rect x="548" y="260" width="340" height="120" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="718" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7dd3fc">HINT</text>
  <text x="718" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0">Check the portrait frame  count the roses.</text>
  <text x="480" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Replace with GIF: send clue ’ projector updates</text>
</svg>
