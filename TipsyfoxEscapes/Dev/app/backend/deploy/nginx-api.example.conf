# Example: api.tipsyfoxescapes.ca → Express on port 3001
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled.

server {
    listen 443 ssl http2;
    server_name api.tipsyfoxescapes.ca;

    # ssl_certificate /etc/letsencrypt/live/api.tipsyfoxescapes.ca/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.tipsyfoxescapes.ca/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
