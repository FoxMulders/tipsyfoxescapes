name: QA suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            Dev/app/backend/package-lock.json
            Dev/app/frontend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
        working-directory: Dev/app/backend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: Dev/app/frontend
      - name: Run four-department QA
        run: npm run qa
