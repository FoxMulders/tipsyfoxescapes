<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Figure B: Generate and refresh theme ideas</title>
  <desc id="desc">A stylized builder screen with Generate For Me and Refresh Ideas buttons producing new theme cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071116"/>
      <stop offset="1" stop-color="#162833"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="96" y="82" width="768" height="376" rx="26" fill="#0b161d" stroke="#57d3df" stroke-opacity=".3"/>
    <text x="134" y="137" fill="#ecf8f7" font-family="Inter,Segoe UI,Arial" font-size="28" font-weight="800">Theme selection</text>
    <text x="134" y="170" fill="#a8bec2" font-family="Inter,Segoe UI,Arial" font-size="17">Generate a fresh set, then refresh without changing your room inputs.</text>
    <g font-family="Inter,Segoe UI,Arial" font-weight="800">
      <rect x="134" y="205" width="190" height="54" rx="16" fill="#57d3df"/>
      <text x="164" y="239" fill="#052127" font-size="18">Generate For Me</text>
      <rect x="344" y="205" width="172" height="54" rx="16" fill="#102a33" stroke="#8ff4dc" stroke-opacity=".6"/>
      <text x="374" y="239" fill="#d9fffb" font-size="18">Refresh Ideas</text>
    </g>
    <g transform="translate(134 300)" font-family="Inter,Segoe UI,Arial">
      <rect width="188" height="104" rx="18" fill="#0f252d" stroke="#57d3df" stroke-opacity=".38"/>
      <text x="18" y="35" fill="#ecf8f7" font-size="17" font-weight="800">Clockwork Gallery</text>
      <text x="18" y="63" fill="#a8bec2" font-size="13">Physical locks + timed art</text>
      <rect x="220" width="188" height="104" rx="18" fill="#0f252d" stroke="#57d3df" stroke-opacity=".38"/>
      <text x="238" y="35" fill="#ecf8f7" font-size="17" font-weight="800">Signal Blackout</text>
      <text x="238" y="63" fill="#a8bec2" font-size="13">Electronic clues + screens</text>
      <rect x="440" width="188" height="104" rx="18" fill="#0f252d" stroke="#57d3df" stroke-opacity=".38"/>
      <text x="458" y="35" fill="#ecf8f7" font-size="17" font-weight="800">Lost Conservatory</text>
      <text x="458" y="63" fill="#a8bec2" font-size="13">Botanical props + logic</text>
    </g>
    <path d="M604 232c42 0 58 35 35 62-14 16-40 19-59 8" fill="none" stroke="#8ff4dc" stroke-width="5" stroke-linecap="round"/>
    <path d="m583 287-5 20 21-1" fill="none" stroke="#8ff4dc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
