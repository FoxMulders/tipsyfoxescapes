<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Figure A: Adding prop tags</title>
  <desc id="desc">A stylized input field showing sofa and TV prop chips being added as individual tags.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08151c"/>
      <stop offset="1" stop-color="#102a33"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="120" y="110" width="720" height="320" rx="24" fill="#0c1720" stroke="#57d3df" stroke-opacity=".36"/>
    <text x="158" y="160" fill="#ecf8f7" font-family="Inter,Segoe UI,Arial" font-size="28" font-weight="800">Available items and props</text>
    <text x="158" y="194" fill="#a8bec2" font-family="Inter,Segoe UI,Arial" font-size="17">One tag = one physical object the AI can anchor to puzzle logic.</text>
    <rect x="158" y="230" width="644" height="86" rx="18" fill="#071116" stroke="#7895a3" stroke-opacity=".45"/>
    <g font-family="Inter,Segoe UI,Arial" font-size="20" font-weight="700">
      <rect x="180" y="252" width="118" height="42" rx="21" fill="#123c44" stroke="#57d3df" stroke-opacity=".5"/>
      <text x="216" y="280" fill="#ecf8f7">sofa</text>
      <circle cx="202" cy="273" r="9" fill="#8ff4dc"/>
      <rect x="314" y="252" width="98" height="42" rx="21" fill="#123c44" stroke="#57d3df" stroke-opacity=".5"/>
      <text x="350" y="280" fill="#ecf8f7">TV</text>
      <circle cx="336" cy="273" r="9" fill="#8ff4dc"/>
      <text x="436" y="280" fill="#6f8990">type next prop...</text>
    </g>
    <path d="M674 274h74" stroke="#8ff4dc" stroke-width="4" stroke-linecap="round"/>
    <path d="m735 253 24 21-24 21" fill="none" stroke="#8ff4dc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(158 344)">
      <rect width="184" height="42" rx="12" fill="#0f252d" stroke="#57d3df" stroke-opacity=".28"/>
      <text x="18" y="27" fill="#c9dcdf" font-family="Inter,Segoe UI,Arial" font-size="16">Press Enter to seal</text>
    </g>
  </g>
</svg>
